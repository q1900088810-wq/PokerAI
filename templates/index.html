<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker AI Analyzer</title>

<style>

body{
    margin:0;
    background:#0f1720;
    color:white;
    font-family:Arial;
}

.container{
    padding:15px;
}

.panel{
    background:#1c2430;
    margin-bottom:15px;
    padding:12px;
    border-radius:10px;
}

.title{
    margin-bottom:8px;
    font-weight:bold;
}

/* 牌 */
.card-slot{
    width:60px;
    height:80px;
    background:white;
    color:black;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    border-radius:8px;
    margin-right:8px;
    font-weight:bold;
    cursor:pointer;
}

#deckPanel{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    padding:15px;
    overflow:auto;
    z-index:999;
}

.deck-card{
    width:55px;
    height:75px;
    background:white;
    color:black;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

    <!-- Hero -->
    <div class="panel">
        <div class="title">Hero 手牌</div>
        <div class="card-slot" id="hero1" onclick="openDeck('hero1')">?</div>
        <div class="card-slot" id="hero2" onclick="openDeck('hero2')">?</div>
    </div>

    <!-- 公共牌 -->
    <div class="panel">
        <div class="title">公共牌</div>

        <div class="card-slot" id="b1" onclick="openDeck('b1')">?</div>
        <div class="card-slot" id="b2" onclick="openDeck('b2')">?</div>
        <div class="card-slot" id="b3" onclick="openDeck('b3')">?</div>
        <div class="card-slot" id="b4" onclick="openDeck('b4')">?</div>
        <div class="card-slot" id="b5" onclick="openDeck('b5')">?</div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>

</html>
