<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker AI</title>

<style>

body{
    margin:0;
    background:#0f1720;
    color:white;
    font-family:Arial;
}

.panel{
    padding:12px;
    margin:10px;
    background:#1c2430;
    border-radius:10px;
}

.card{
    width:60px;
    height:80px;
    background:white;
    color:black;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    border-radius:8px;
    margin:5px;
    cursor:pointer;
    font-weight:bold;
}

/* 牌库 */
#deck{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    flex-wrap:wrap;
    padding:15px;
    overflow:auto;
    z-index:999;
}

.deck-card{
    width:55px;
    height:75px;
    background:white;
    color:black;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:6px;
    margin:5px;
    cursor:pointer;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="panel">
    <h3>Hero</h3>
    <div id="hero1" class="card">?</div>
    <div id="hero2" class="card">?</div>
</div>

<div class="panel">
    <h3>公共牌</h3>
    <div id="b1" class="card">?</div>
    <div id="b2" class="card">?</div>
    <div id="b3" class="card">?</div>
    <div id="b4" class="card">?</div>
    <div id="b5" class="card">?</div>
</div>

<!-- 牌库 -->
<div id="deck"></div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
