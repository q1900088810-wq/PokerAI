<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker AI Analyzer</title>

<style>

body{
    margin:0;
    background:#0f1720;
    color:white;
    font-family:Arial;
}

.panel{
    margin:10px;
    padding:12px;
    background:#1c2430;
    border-radius:10px;
}

.title{
    margin-bottom:8px;
    font-weight:bold;
}

/* 手牌 / 公共牌 */
.card{
    width:85px;
    height:115px;
    background:white;
    color:black;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    margin:5px;
    font-size:20px;
    cursor:pointer;
    font-weight:bold;
}

/* 牌库 */
#deck{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    flex-wrap:wrap;
    padding:15px;
    overflow:auto;
    z-index:999;
}

.deck-card{
    width:80px;
    height:110px;
    background:white;
    color:black;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    margin:6px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

/* 人数选择 */
select{
    padding:8px;
    font-size:16px;
}

</style>

</head>

<body>

<!-- 玩家人数 -->
<div class="panel">
    <div class="title">玩家人数</div>
    <select id="playerCount">
        <option value="2">2人</option>
        <option value="3">3人</option>
        <option value="4">4人</option>
        <option value="5">5人</option>
        <option value="6">6人</option>
        <option value="7">7人</option>
        <option value="8">8人</option>
        <option value="9" selected>9人</option>
    </select>
</div>

<!-- Hero -->
<div class="panel">
    <div class="title">Hero 手牌</div>
    <div class="card" id="hero1">?</div>
    <div class="card" id="hero2">?</div>
</div>

<!-- 公共牌 -->
<div class="panel">
    <div class="title">公共牌</div>

    <div class="card" id="b1">?</div>
    <div class="card" id="b2">?</div>
    <div class="card" id="b3">?</div>
    <div class="card" id="b4">?</div>
    <div class="card" id="b5">?</div>

</div>

<!-- 牌库 -->
<div id="deck"></div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
